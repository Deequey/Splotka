name: easypatterns
description: "Keep your patterns in one place"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  #file operators
  path_provider: ^2.1.1
  file_selector: ^1.0.0
  open_filex: ^4.3.2
  #PDF
  pdfx: ^2.5.0
  #Data persistence
  shared_preferences: ^2.2.2 # NOWY: Do zapisywania ustawień
  #UI
  google_fonts: ^6.1.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
